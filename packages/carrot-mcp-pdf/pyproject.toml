[project]
name = "carrot-mcp-pdf"
version = "0.1.2"
description = "Carrot MCP PDF Server"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.28.0",
    "pymupdf4llm>=1.27.2.3",
    "litellm>=1.90.0",
]

[project.scripts]
carrot-mcp-pdf = "carrot_mcp_pdf.server:main"

[project.entry-points."carrot_mcp.servers"]
pdf = "carrot_mcp_pdf.server:mcp"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/carrot_mcp_pdf"]
