[project]
name = "carrot-mcp-ds"
version = "0.0.2"
description = "Carrot MCP Datasheet Server"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "mcp",
]

[project.scripts]
carrot-mcp-ds = "carrot_mcp_ds.server:main"

[project.entry-points."carrot_mcp.servers"]
ds = "carrot_mcp_ds.server:mcp"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/carrot_mcp_ds"]
