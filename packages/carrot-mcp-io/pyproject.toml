[project]
name = "carrot-mcp-io"
version = "0.3.1"
description = "Carrot MCP IO Server - serial, TCP, UDP"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.28.0",
    "pyserial",
]

[project.scripts]
carrot-mcp-io = "carrot_mcp_io.server:main"

[project.entry-points."carrot_mcp.servers"]
io = "carrot_mcp_io.server:mcp"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/carrot_mcp_io"]
