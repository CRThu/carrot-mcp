[project]
name = "carrot-mcp-sys"
version = "0.1.0"
description = "Carrot MCP System Server - screenshot, keyboard, app launcher"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.28.0",
    "mss>=9.0.0",
]

[project.scripts]
carrot-mcp-sys = "carrot_mcp_sys.server:main"

[project.entry-points."carrot_mcp.servers"]
sys = "carrot_mcp_sys.server:mcp"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/carrot_mcp_sys"]
