[project]
name = "carrot-mcp-serial"
version = "0.1.0"
description = "Carrot MCP Serial Server"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "mcp",
    "pyserial",
]

[project.scripts]
carrot-mcp-serial = "carrot_mcp_serial.server:main"

[project.entry-points."carrot_mcp.servers"]
serial = "carrot_mcp_serial.server:mcp"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/carrot_mcp_serial"]
