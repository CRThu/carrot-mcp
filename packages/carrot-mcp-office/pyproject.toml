[project]
name = "carrot-mcp-office"
version = "0.2.8"
description = "Carrot MCP Office Server"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.28.0",
    "openpyxl>=3.1.0",
    "python-docx>=1.1.0",
]

[project.scripts]
carrot-mcp-office = "carrot_mcp_office.server:main"

[project.entry-points."carrot_mcp.servers"]
office = "carrot_mcp_office.server:mcp"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/carrot_mcp_office"]
