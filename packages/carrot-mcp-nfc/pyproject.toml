[project]
name = "carrot-mcp-nfc"
version = "0.0.3"
description = "Carrot MCP NFC Server"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.28.0",
]

[project.scripts]
carrot-mcp-nfc = "carrot_mcp_nfc.server:main"

[project.entry-points."carrot_mcp.servers"]
nfc = "carrot_mcp_nfc.server:mcp"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/carrot_mcp_nfc"]
